<!doctype html>
<html class="is-booting" lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Altitude | 404</title>
    <meta name="description" content="Error 404 - Page Not Found">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <style>
      @font-face {
        font-family: "Montserrat";
        src: url("/assets/fonts/Montserrat/Montserrat-VariableFont_wght.ttf") format("truetype");
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --sky-top: #74c6f6;
        --sky-mid: #c7ecff;
        --sky-bottom: #f4fbff;
        --ink: #101820;
        --glass: rgba(255, 255, 255, 0.5);
        --glass-line: rgba(255, 255, 255, 0.64);
        --progress: 0;
        --altitude: 0;
        --ground-opacity: 1;
        --bird-opacity: 1;
        --flight-opacity: 0;
        --cloud-opacity: 1;
        --high-cloud-opacity: 0;
        --stars-opacity: 0;
        --upper-shade: 0;
        --ground-glow: 0.34;
        --sun-opacity: 0.28;
        --ground-drop: 0vh;
        --site-drop: 0vh;
        --bird-rise: 0vh;
        --cloud-shift: 0vh;
        --high-cloud-shift: 0vh;
        --flight-shift: 0vh;
        --hint-color: rgba(16, 24, 32, 0.62);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--sky-bottom);
        scroll-behavior: auto;
      }

      body {
        margin: 0;
        min-height: 680vh;
        color: var(--ink);
        background: var(--sky-bottom);
        font-family: "Montserrat", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        overflow-x: hidden;
      }

      .is-booting body {
        visibility: hidden;
      }

      .scene {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 16%, rgba(255, 255, 255, 0.5), transparent 26vw),
          linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 46%, var(--sky-bottom) 100%);
      }

      .stars {
        position: absolute;
        inset: 0;
        opacity: var(--stars-opacity);
        pointer-events: none;
      }

      .star {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: var(--size);
        height: var(--size);
        border-radius: 50%;
        opacity: var(--o);
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 0 var(--glow) rgba(196, 226, 255, 0.72);
      }

      .scene::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(3, 6, 18, var(--upper-shade)), transparent 38%),
          radial-gradient(circle at 50% 106%, rgba(255, 255, 255, var(--ground-glow)), transparent 36vw);
      }

      .atmosphere-line {
        position: absolute;
        left: 0;
        right: 0;
        top: clamp(72px, 15vh, 150px);
        height: 1px;
        opacity: var(--stars-opacity);
        background: linear-gradient(90deg, transparent, rgba(140, 212, 250, 0.92), rgba(255, 255, 255, 0.84), transparent);
        box-shadow:
          0 0 28px rgba(140, 212, 250, 0.85),
          0 10px 72px rgba(255, 255, 255, 0.48);
      }

      .sun-glow {
        position: absolute;
        width: 44vmin;
        height: 44vmin;
        right: min(14vw, 170px);
        top: min(14vh, 112px);
        border-radius: 50%;
        opacity: var(--sun-opacity);
        background: radial-gradient(circle, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.28) 28%, transparent 66%);
        filter: blur(4px);
      }

      .layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .lower-clouds {
        opacity: var(--cloud-opacity);
      }

      .high-clouds {
        opacity: var(--high-cloud-opacity);
      }

      .cloud {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: var(--w);
        max-width: 92vw;
        aspect-ratio: 3.85 / 1;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(232, 241, 248, 0.92) 68%, rgba(184, 199, 208, 0.75));
        box-shadow: 0 28px 54px rgba(46, 81, 105, 0.16);
        opacity: var(--o);
        transform: translate3d(0, var(--cloud-shift), 0) scale(var(--s));
      }

      .cloud::before,
      .cloud::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        background: inherit;
      }

      .cloud::before {
        width: 56%;
        height: 110%;
        left: 18%;
        top: -46%;
      }

      .cloud::after {
        width: 38%;
        height: 92%;
        right: 12%;
        top: -28%;
      }

      .cloud--high {
        aspect-ratio: 8 / 1;
        opacity: var(--o);
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.68), transparent);
        box-shadow: none;
        filter: blur(1px);
        transform: translate3d(0, var(--high-cloud-shift), 0) scale(var(--s));
      }

      .cloud--high::before,
      .cloud--high::after {
        display: none;
      }

      .birds {
        opacity: var(--bird-opacity);
        transform: translate3d(0, var(--bird-rise), 0);
      }

      .bird {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: var(--size);
        aspect-ratio: 2.2 / 1;
        color: rgba(16, 24, 32, 0.64);
        animation: bird-drift var(--speed) linear infinite;
        animation-delay: var(--delay);
      }

      .bird span {
        position: absolute;
        left: 50%;
        top: 48%;
        width: 14%;
        height: 12%;
        border-radius: 999px;
        background: currentColor;
        transform: translate(-50%, -50%);
      }

      .bird::before,
      .bird::after {
        content: "";
        position: absolute;
        top: 26%;
        width: 52%;
        height: 62%;
        border-top: 2px solid currentColor;
        transform-origin: 100% 50%;
        animation: left-wing-flap 1.18s ease-in-out infinite;
        animation-delay: var(--flap-delay);
      }

      .bird::before {
        left: 0;
        border-radius: 100% 0 0 0;
      }

      .bird::after {
        right: 0;
        border-radius: 0 100% 0 0;
        transform-origin: 0 50%;
        animation-name: right-wing-flap;
      }

      @keyframes left-wing-flap {
        0%,
        100% {
          transform: rotate(20deg) translateY(0);
        }

        50% {
          transform: rotate(-26deg) translateY(18%);
        }
      }

      @keyframes right-wing-flap {
        0%,
        100% {
          transform: rotate(-20deg) translateY(0);
        }

        50% {
          transform: rotate(26deg) translateY(18%);
        }
      }

      @keyframes bird-drift {
        from {
          translate: -14vw 0;
        }

        to {
          translate: 116vw -8vh;
        }
      }

      .flyway {
        opacity: var(--flight-opacity);
      }

      .aircraft {
        position: fixed;
        left: -260px;
        top: calc(var(--top) + var(--flight-shift));
        z-index: 3;
        width: 220px;
        height: 72px;
        color: rgba(250, 253, 255, 0.94);
        filter: drop-shadow(0 14px 18px rgba(13, 40, 64, 0.18));
        animation: fly-past var(--duration) linear forwards;
        animation-delay: var(--delay, 0s);
      }

      .aircraft--reverse {
        left: auto;
        right: -260px;
        transform: scaleX(-1);
        animation-name: fly-past-reverse;
      }

      .aircraft__fuselage,
      .aircraft__main-wing,
      .aircraft__tail-wing,
      .aircraft__fin,
      .aircraft__window,
      .aircraft__engine {
        position: absolute;
        z-index: 2;
      }

      .aircraft__fuselage {
        left: 52px;
        top: 29px;
        width: 126px;
        height: 15px;
        border-radius: 999px 72% 72% 999px;
        background: currentColor;
        box-shadow: inset 20px 0 18px rgba(140, 212, 250, 0.18);
      }

      .aircraft__fuselage::after {
        content: "";
        position: absolute;
        right: -16px;
        top: 1px;
        width: 30px;
        height: 13px;
        border-radius: 0 999px 999px 0;
        background: currentColor;
        clip-path: polygon(0 0, 100% 50%, 0 100%);
      }

      .aircraft__main-wing {
        left: 80px;
        top: 9px;
        width: 84px;
        height: 56px;
        background: currentColor;
        clip-path: polygon(100% 42%, 4% 0, 32% 47%, 4% 100%, 100% 60%, 86% 50%);
        opacity: 0.96;
      }

      .aircraft__tail-wing {
        left: 45px;
        top: 18px;
        width: 38px;
        height: 36px;
        background: currentColor;
        clip-path: polygon(0 24%, 100% 44%, 100% 58%, 0 82%, 30% 52%);
        opacity: 0.92;
      }

      .aircraft__fin {
        left: 56px;
        top: 8px;
        width: 32px;
        height: 30px;
        background: currentColor;
        clip-path: polygon(0 100%, 82% 0, 100% 100%);
        opacity: 0.9;
      }

      .aircraft__window {
        left: 144px;
        top: 31px;
        width: 18px;
        height: 6px;
        border-radius: 999px;
        background: rgba(90, 178, 224, 0.76);
      }

      .aircraft__engine {
        left: 106px;
        top: 47px;
        width: 18px;
        height: 7px;
        border-radius: 0 0 999px 999px;
        background: rgba(229, 241, 248, 0.96);
        box-shadow: 38px 0 0 rgba(229, 241, 248, 0.96);
      }

      .contrail {
        position: absolute;
        right: 154px;
        top: 31px;
        z-index: 1;
        width: min(45vw, 480px);
        height: 7px;
        opacity: 0.72;
        background:
          linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28) 18%, rgba(255, 255, 255, 0.82));
        filter: blur(1.3px);
      }

      .contrail::after {
        content: "";
        position: absolute;
        left: 7%;
        right: 4%;
        top: 12px;
        height: 5px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.72));
        filter: blur(2.4px);
      }

      .contrail::before {
        content: "";
        position: absolute;
        left: 16%;
        right: 1%;
        top: -11px;
        height: 5px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0.7));
        filter: blur(2.2px);
      }

      @keyframes fly-past {
        from {
          translate: -12vw 0;
        }

        to {
          translate: calc(100vw + 420px) -5vh;
        }
      }

      @keyframes fly-past-reverse {
        from {
          translate: 12vw 0;
        }

        to {
          translate: calc(-100vw - 420px) -5vh;
        }
      }

      .ground {
        position: absolute;
        left: -6vw;
        right: -6vw;
        bottom: -15vh;
        height: 42vh;
        opacity: var(--ground-opacity);
        transform: translate3d(0, var(--ground-drop), 0);
        background:
          radial-gradient(ellipse at 52% 0%, rgba(255, 255, 255, 0.32), transparent 34%),
          linear-gradient(180deg, #8fbd71, #5d8d59 45%, #3f6344);
        border-radius: 50% 50% 0 0 / 24% 24% 0 0;
        box-shadow: 0 -22px 72px rgba(56, 96, 74, 0.28);
      }

      .ground::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 0;
        width: min(44vw, 480px);
        height: 25vh;
        transform: translateX(-50%) perspective(240px) rotateX(58deg);
        transform-origin: bottom center;
        border-radius: 18px 18px 0 0;
        background:
          linear-gradient(90deg, transparent 47%, rgba(255, 255, 255, 0.72) 47% 53%, transparent 53%),
          repeating-linear-gradient(180deg, transparent 0 22px, rgba(255, 255, 255, 0.46) 22px 30px, transparent 30px 70px),
          #596170;
        box-shadow: 0 16px 60px rgba(16, 24, 32, 0.22);
      }

      .launch-site {
        position: absolute;
        left: 50%;
        bottom: 17vh;
        z-index: 2;
        width: min(78vw, 780px);
        height: 38vh;
        opacity: var(--ground-opacity);
        transform: translate3d(-50%, var(--site-drop), 0);
      }

      .pad-deck {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: min(64vw, 640px);
        height: 58px;
        transform: translateX(-50%);
        border-radius: 8px 8px 18px 18px;
        background:
          linear-gradient(90deg, transparent 0 9%, rgba(255, 255, 255, 0.3) 9% 10%, transparent 10% 22%, rgba(255, 255, 255, 0.28) 22% 23%, transparent 23%),
          linear-gradient(180deg, #8b98a0, #56636c);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.44),
          0 18px 36px rgba(16, 24, 32, 0.24);
      }

      .pad-deck::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -23px;
        width: 210px;
        height: 34px;
        transform: translateX(-50%);
        border-radius: 0 0 24px 24px;
        background:
          repeating-linear-gradient(90deg, transparent 0 22px, rgba(255, 255, 255, 0.14) 22px 25px),
          linear-gradient(180deg, #394650, #263139);
      }

      .flame-trench {
        position: absolute;
        left: 50%;
        bottom: -20px;
        width: 280px;
        height: 52px;
        transform: translateX(-50%) perspective(220px) rotateX(58deg);
        transform-origin: top center;
        border-radius: 12px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.22), transparent 18% 82%, rgba(255, 255, 255, 0.16)),
          linear-gradient(180deg, #27313a, #12191f);
      }

      .tower {
        position: absolute;
        left: 18%;
        bottom: 42px;
        width: 118px;
        height: 92%;
        border-left: 5px solid rgba(42, 55, 61, 0.7);
        border-right: 5px solid rgba(42, 55, 61, 0.7);
        background:
          repeating-linear-gradient(135deg, transparent 0 22px, rgba(42, 55, 61, 0.56) 22px 26px, transparent 26px 52px),
          repeating-linear-gradient(45deg, transparent 0 24px, rgba(42, 55, 61, 0.42) 24px 27px, transparent 27px 54px);
      }

      .tower::before,
      .tower::after {
        content: "";
        position: absolute;
        left: -18px;
        right: -18px;
        height: 8px;
        border-radius: 999px;
        background: rgba(42, 55, 61, 0.72);
      }

      .tower::before {
        top: 20%;
      }

      .tower::after {
        top: 55%;
      }

      .service-arm {
        position: absolute;
        left: calc(18% + 92px);
        width: min(30vw, 220px);
        height: 8px;
        border-radius: 999px;
        background: rgba(52, 68, 76, 0.72);
        transform-origin: left center;
      }

      .service-arm--top {
        bottom: 64%;
        transform: rotate(-8deg);
      }

      .service-arm--mid {
        bottom: 43%;
        width: min(24vw, 170px);
        transform: rotate(10deg);
      }

      .service-arm::after {
        content: "";
        position: absolute;
        right: -8px;
        top: -10px;
        width: 22px;
        height: 28px;
        border-radius: 6px;
        background: rgba(52, 68, 76, 0.7);
      }

      .support-cable {
        position: absolute;
        left: 32%;
        bottom: 58px;
        width: 2px;
        height: 74%;
        background: rgba(42, 55, 61, 0.34);
        transform: rotate(19deg);
        transform-origin: bottom center;
      }

      .support-cable--right {
        left: 66%;
        height: 64%;
        transform: rotate(-16deg);
      }

      .rocket {
        position: absolute;
        left: 50%;
        bottom: 38px;
        width: 58px;
        height: 206px;
        transform: translateX(-50%);
        border-radius: 50% 50% 18px 18px / 24% 24% 10px 10px;
        background:
          linear-gradient(90deg, rgba(15, 24, 35, 0.16), transparent 32%, rgba(255, 255, 255, 0.42) 58%, rgba(15, 24, 35, 0.1)),
          linear-gradient(180deg, #f9fcff, #ced8df);
        box-shadow: 0 20px 30px rgba(16, 24, 32, 0.18);
      }

      .rocket::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 44px;
        width: 22px;
        height: 22px;
        transform: translateX(-50%);
        border-radius: 50%;
        background: #8cd4fa;
        border: 4px solid rgba(16, 24, 32, 0.18);
      }

      .rocket::after {
        content: "";
        position: absolute;
        inset: auto -16px 0 -16px;
        height: 44px;
        background:
          linear-gradient(135deg, transparent 0 30%, #d9543f 31% 70%, transparent 71%),
          linear-gradient(225deg, transparent 0 30%, #d9543f 31% 70%, transparent 71%);
      }

      .umbilical {
        position: absolute;
        left: calc(50% - 120px);
        bottom: 118px;
        width: 124px;
        height: 48px;
        border-top: 5px solid rgba(58, 72, 80, 0.68);
        border-right: 5px solid rgba(58, 72, 80, 0.68);
        border-radius: 0 14px 0 0;
      }

      .error-panel {
        position: fixed;
        inset: 0;
        z-index: 6;
        display: grid;
        place-items: center;
        padding: 28px;
        text-align: center;
        pointer-events: none;
      }

      .error-panel__inner {
        max-width: min(940px, 92vw);
      }

      h1 {
        margin: 0;
        color: rgba(255, 255, 255, 0.96);
        font-size: clamp(3.2rem, 9vw, 8.6rem);
        line-height: 0.93;
        font-weight: 900;
        letter-spacing: 0;
        text-shadow:
          0 0 10px rgba(255, 255, 255, 0.76),
          0 0 34px rgba(140, 212, 250, 0.44),
          0 20px 52px rgba(12, 34, 54, 0.28);
      }

      .altitude-readout {
        position: fixed;
        left: 24px;
        bottom: 24px;
        z-index: 8;
        min-width: 174px;
        padding: 14px 16px;
        border: 1px solid var(--glass-line);
        border-radius: 8px;
        color: rgba(16, 24, 32, 0.78);
        background: var(--glass);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.62),
          0 16px 38px rgba(13, 40, 64, 0.15);
        backdrop-filter: blur(12px);
      }

      .altitude-readout span {
        display: block;
        font-size: 0.68rem;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .altitude-readout strong {
        display: block;
        margin-top: 4px;
        font-size: 1.45rem;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0;
      }

      .home-link {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 8;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 20px;
        border: 1px solid var(--glass-line);
        border-radius: 8px;
        color: rgba(16, 24, 32, 0.86);
        background: var(--glass);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.62),
          0 16px 38px rgba(13, 40, 64, 0.15);
        font-size: 0.9rem;
        font-weight: 850;
        text-decoration: none;
        backdrop-filter: blur(12px);
        pointer-events: auto;
      }

      .scroll-hint {
        position: fixed;
        left: 50%;
        bottom: 30px;
        z-index: 8;
        transform: translateX(-50%);
        color: var(--hint-color);
        font-size: 0.74rem;
        font-weight: 850;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      @media (max-width: 720px) {
        body {
          min-height: 620vh;
        }

        .cloud {
          max-width: 84vw;
        }

        .launch-site {
          width: 92vw;
        }

        .tower {
          left: 8%;
          width: 74px;
        }

        .rocket {
          left: 50%;
          width: 44px;
          height: 150px;
        }

        .pad-deck {
          width: 94vw;
        }

        .service-arm {
          left: calc(8% + 58px);
        }

        .umbilical {
          left: calc(50% - 92px);
          width: 94px;
          bottom: 104px;
        }

        .altitude-readout {
          left: 14px;
          bottom: 14px;
          min-width: 136px;
          padding: 12px 13px;
        }

        .altitude-readout strong {
          font-size: 1.12rem;
        }

        .home-link {
          right: 14px;
          bottom: 14px;
          min-height: 44px;
          padding: 0 14px;
        }

        .scroll-hint {
          bottom: 74px;
          width: min(280px, 72vw);
          text-align: center;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .bird,
        .aircraft {
          animation: none;
        }

        .bird::before,
        .bird::after {
          animation: none;
        }
      }
    </style>
    <script>
      document.documentElement.classList.add("is-booting");
    </script>
  </head>
  <body>
    <main class="scene" aria-label="Error 404 - Page Not Found">
      <div class="stars" aria-hidden="true"></div>
      <div class="sun-glow" aria-hidden="true"></div>
      <div class="atmosphere-line" aria-hidden="true"></div>

      <div class="layer lower-clouds" aria-hidden="true">
        <span class="cloud" style="--x: -4%; --y: 20vh; --w: 430px; --s: 1.08; --o: 0.88; --drift: -42vh;"></span>
        <span class="cloud" style="--x: 62%; --y: 18vh; --w: 360px; --s: 0.86; --o: 0.66; --drift: -58vh;"></span>
        <span class="cloud" style="--x: 12%; --y: 58vh; --w: 520px; --s: 0.94; --o: 0.86; --drift: -64vh;"></span>
        <span class="cloud" style="--x: 72%; --y: 70vh; --w: 460px; --s: 1.02; --o: 0.72; --drift: -78vh;"></span>
      </div>

      <div class="layer high-clouds" aria-hidden="true">
        <span class="cloud cloud--high" style="--x: 8%; --y: 26vh; --w: 46vw; --s: 1; --o: 0.66; --drift: -10vh;"></span>
        <span class="cloud cloud--high" style="--x: 48%; --y: 56vh; --w: 38vw; --s: 0.82; --o: 0.58; --drift: -16vh;"></span>
        <span class="cloud cloud--high" style="--x: -10%; --y: 74vh; --w: 54vw; --s: 0.9; --o: 0.42; --drift: -20vh;"></span>
      </div>

      <div class="layer birds" aria-hidden="true">
        <span class="bird" style="--x: 7%; --y: 28vh; --size: 34px; --speed: 28s; --delay: -11s; --flap-delay: -0.2s;"><span></span></span>
        <span class="bird" style="--x: 18%; --y: 34vh; --size: 22px; --speed: 33s; --delay: -4s; --flap-delay: -0.7s;"><span></span></span>
        <span class="bird" style="--x: 63%; --y: 25vh; --size: 26px; --speed: 31s; --delay: -19s; --flap-delay: -0.4s;"><span></span></span>
        <span class="bird" style="--x: 72%; --y: 42vh; --size: 18px; --speed: 36s; --delay: -23s; --flap-delay: -0.9s;"><span></span></span>
        <span class="bird" style="--x: 35%; --y: 49vh; --size: 30px; --speed: 29s; --delay: -7s; --flap-delay: -0.1s;"><span></span></span>
      </div>

      <div class="flyway" aria-hidden="true"></div>

      <div class="launch-site" aria-hidden="true">
        <span class="support-cable"></span>
        <span class="support-cable support-cable--right"></span>
        <span class="tower"></span>
        <span class="service-arm service-arm--top"></span>
        <span class="service-arm service-arm--mid"></span>
        <span class="umbilical"></span>
        <span class="rocket"></span>
        <span class="flame-trench"></span>
        <span class="pad-deck"></span>
      </div>
      <div class="ground" aria-hidden="true"></div>

      <section class="error-panel">
        <div class="error-panel__inner">
          <h1>Error 404 - Page Not Found</h1>
        </div>
      </section>

      <aside class="altitude-readout" aria-live="polite">
        <span>Altitude</span>
        <strong id="altitude-value">0 km</strong>
      </aside>
      <span class="scroll-hint">Scroll altitude up or down</span>
      <a class="home-link" href="/website/index.html">Return home</a>
    </main>

    <script>
      const root = document.documentElement;
      const altitudeValue = document.querySelector("#altitude-value");
      const flyway = document.querySelector(".flyway");
      const stars = document.querySelector(".stars");
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const atmosphereLimitKm = 100;
      let maxScroll = 1;
      let latestProgress = 0;
      let ticking = false;
      let aircraftTimer = 0;
      let wasInFlightBand = false;

      function clamp(value, min = 0, max = 1) {
        return Math.min(max, Math.max(min, value));
      }

      function range(start, end, value) {
        return clamp((value - start) / (end - start));
      }

      function ease(value) {
        return value * value * (3 - 2 * value);
      }

      function mix(a, b, amount) {
        return Math.round(a + (b - a) * amount);
      }

      function color(from, to, amount) {
        return `rgb(${mix(from[0], to[0], amount)}, ${mix(from[1], to[1], amount)}, ${mix(from[2], to[2], amount)})`;
      }

      function seedStars() {
        const starCount = window.innerWidth < 720 ? 34 : 78;
        const fragment = document.createDocumentFragment();
        stars.replaceChildren();

        for (let i = 0; i < starCount; i += 1) {
          const star = document.createElement("span");
          const size = 1 + Math.random() * 1.9;
          const x = Math.random() * 100;
          const y = Math.random() * 100;
          const opacity = 0.42 + Math.random() * 0.58;
          const glow = 5 + Math.random() * 11;

          star.className = "star";
          star.style.setProperty("--x", `${x.toFixed(2)}%`);
          star.style.setProperty("--y", `${y.toFixed(2)}%`);
          star.style.setProperty("--size", `${size.toFixed(2)}px`);
          star.style.setProperty("--o", opacity.toFixed(2));
          star.style.setProperty("--glow", `${glow.toFixed(1)}px`);
          fragment.append(star);
        }

        stars.append(fragment);
      }

      function calculateMaxScroll() {
        maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
      }

      function paint() {
        calculateMaxScroll();
        latestProgress = clamp(1 - (window.scrollY / maxScroll));

        const lowerFade = ease(1 - range(0.035, 0.11, latestProgress));
        const birdFade = ease(1 - range(0.05, 0.11, latestProgress));
        const cloudFade = ease(1 - range(0.52, 0.72, latestProgress));
        const highCloudFade = ease(range(0.28, 0.52, latestProgress)) * ease(1 - range(0.72, 0.88, latestProgress));
        const flightFade = ease(range(0.085, 0.105, latestProgress)) * ease(1 - range(0.145, 0.165, latestProgress));
        const starsFade = ease(range(0.7, 0.9, latestProgress));
        const darkness = ease(range(0.16, 1, latestProgress));
        const altitudeKm = Math.round(latestProgress * atmosphereLimitKm);
        const inFlightBand = latestProgress >= 0.085 && latestProgress <= 0.165;
        const lowerCloudOffset = range(0.52, 0.72, latestProgress) * 70;
        const highCloudOffset = ((1 - range(0.28, 0.52, latestProgress)) * -56) + (range(0.72, 0.88, latestProgress) * 56);
        const birdOffset = range(0.05, 0.11, latestProgress) * 48;
        const flightOffset = ((1 - range(0.085, 0.105, latestProgress)) * -34) + (range(0.145, 0.165, latestProgress) * 34);

        root.style.setProperty("--progress", latestProgress.toFixed(4));
        root.style.setProperty("--altitude", altitudeKm);
        root.style.setProperty("--ground-opacity", lowerFade.toFixed(3));
        root.style.setProperty("--bird-opacity", birdFade.toFixed(3));
        root.style.setProperty("--cloud-opacity", cloudFade.toFixed(3));
        root.style.setProperty("--high-cloud-opacity", highCloudFade.toFixed(3));
        root.style.setProperty("--flight-opacity", flightFade.toFixed(3));
        root.style.setProperty("--stars-opacity", starsFade.toFixed(3));
        root.style.setProperty("--upper-shade", (latestProgress * 0.34).toFixed(3));
        root.style.setProperty("--ground-glow", ((1 - latestProgress) * 0.34).toFixed(3));
        root.style.setProperty("--sun-opacity", Math.max(0.08, 0.28 - latestProgress * 0.14).toFixed(3));
        root.style.setProperty("--ground-drop", `${(latestProgress * 72).toFixed(2)}vh`);
        root.style.setProperty("--site-drop", `${(latestProgress * 88).toFixed(2)}vh`);
        root.style.setProperty("--bird-rise", `${birdOffset.toFixed(2)}vh`);
        root.style.setProperty("--cloud-shift", `${lowerCloudOffset.toFixed(2)}vh`);
        root.style.setProperty("--high-cloud-shift", `${highCloudOffset.toFixed(2)}vh`);
        root.style.setProperty("--flight-shift", `${flightOffset.toFixed(2)}vh`);
        root.style.setProperty("--sky-top", color([116, 198, 246], [4, 8, 24], darkness));
        root.style.setProperty("--sky-mid", color([199, 236, 255], [13, 24, 56], darkness));
        root.style.setProperty("--sky-bottom", color([244, 251, 255], [38, 75, 119], darkness));
        root.style.setProperty("--hint-color", darkness > 0.55 ? "rgba(232, 244, 255, 0.78)" : "rgba(16, 24, 32, 0.62)");

        altitudeValue.textContent = `${altitudeKm} km`;
        if (inFlightBand && !wasInFlightBand) {
          window.requestAnimationFrame(spawnAircraft);
        }
        wasInFlightBand = inFlightBand;
        ticking = false;
      }

      function requestPaint() {
        if (!ticking) {
          window.requestAnimationFrame(paint);
          ticking = true;
        }
      }

      function spawnAircraft() {
        if (reducedMotion || latestProgress < 0.085 || latestProgress > 0.165) return;
        if (flyway.querySelector(".aircraft")) return;

        const plane = document.createElement("span");
        const fuselage = document.createElement("span");
        const mainWing = document.createElement("span");
        const tailWing = document.createElement("span");
        const fin = document.createElement("span");
        const cockpitWindow = document.createElement("span");
        const engine = document.createElement("span");
        const contrail = document.createElement("span");
        const reverse = false;
        plane.className = `aircraft${reverse ? " aircraft--reverse" : ""}`;
        plane.style.setProperty("--top", `${22 + Math.random() * 42}vh`);
        plane.style.setProperty("--duration", `${15 + Math.random() * 9}s`);
        plane.style.setProperty("--delay", `${-0.4 - Math.random() * 0.8}s`);
        fuselage.className = "aircraft__fuselage";
        mainWing.className = "aircraft__main-wing";
        tailWing.className = "aircraft__tail-wing";
        fin.className = "aircraft__fin";
        cockpitWindow.className = "aircraft__window";
        engine.className = "aircraft__engine";
        contrail.className = "contrail";
        plane.append(contrail, tailWing, fin, fuselage, mainWing, cockpitWindow, engine);
        flyway.append(plane);
        plane.addEventListener("animationend", () => plane.remove(), { once: true });
        window.setTimeout(() => plane.remove(), 26000);
      }

      function bootAtRandomAltitude() {
        seedStars();
        calculateMaxScroll();
        const startProgress = 0.04 + Math.random() * 0.88;
        window.scrollTo(0, Math.round(maxScroll * (1 - startProgress)));
        paint();
        window.requestAnimationFrame(() => {
          root.classList.remove("is-booting");
        });
      }

      window.addEventListener("resize", requestPaint);
      window.addEventListener("scroll", requestPaint, { passive: true });
      window.addEventListener("DOMContentLoaded", bootAtRandomAltitude);

      aircraftTimer = window.setInterval(spawnAircraft, 24000);
      window.addEventListener("pagehide", () => window.clearInterval(aircraftTimer));
    </script>
  </body>
</html>
